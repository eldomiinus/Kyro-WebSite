<!DOCTYPE html>
<html lang="es">
  
  <!-- # Encabezado de la página -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kyro.exe</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="Images/Cat - Rojo v2.png" type="image/x-icon">
  </head>
  
  <body>
    
    <!-- # Página completa, centrada y con espacio alrededor -->
    <div class="page-shell">
      
      <!-- # Columna izquierda de contenido -->
    <section class="hero__info">
          
          <!-- # Título principal en tipografía serif -->
          <h1 class="hero__title-logo">
            <img src="Images/Kyro Store.png" alt="Kyro Store" class="hero__logo-img" />
          </h1>
          
          <!-- # Enlaces de contacto y red social -->
          <!-- # SIGUENOS EN INSTAGRAM -->
          <div class="hero__contacts">
            <div class="hero__contacts_instagram">
              <a href="https://www.instagram.com/kyroshop.exe/?hl=es" target="_blank" class="hero__contact-link">
                <img src="Images/Instagram.png" alt="Instagram" class="hero__contact-icon_instagram" />
                <div class="hero__contact-text">
                  <span class="hero__contact-label_instagram">Síguenos en</span>
                  <span class="hero__contact-name_instagram">INSTAGRAM</span>
                </div>
              </a>
            </div>
            
            <!-- # CONTACTANOS POR MAIL -->
            <div class="hero__contacts_mail">
              <a href="mailto:kyroshop.exe@gmail.com" target="_blank" class="hero__contact-link">
                <img src="Images/Mail.png" alt="Mail" class="hero__contact-icon_mail" />
                <div class="hero__contact-text">
                  <span class="hero__contact-label_mail">Contáctanos por</span>
                  <span class="hero__contact-name_mail">MAIL</span>
                </div>
              </a>
            </div>
          </div>
          
          <!-- # Frase secundaria en japonés -->
          <p class="hero__subtitle">衣装を通し、自己表現の一部であれ。</p>
          
          <!-- # Nota de créditos al autor -->
          <p class="hero__credit">
            <span>Página hecha por:</span>
            <a href="https://github.com/eldomiinus" target="_blank" class="hero__link">@eldomiinus</a>
          </p>
    </section>
    
    <!-- # Columna derecha con los mockups de iPhone -->
    <section class="hero__mockups">
          <div class="hero__mockup hero__mockup--main">
            <img src="Images/iPhone 12 Pro 1.png" alt="Mockup Kyro Store" />
          </div>
          <div class="hero__mockup hero__mockup--secondary">
            <img src="Images/iPhone 12 Pro 2.png" alt="Mockup October Collection" />
          </div>
    </section>
    </div>
  </body>
  
</html>
