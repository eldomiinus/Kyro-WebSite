<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kyro Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Contenedor principal de la página -->
  <div class="page-shell">
    <!-- Sección principal del hero -->
    <main class="hero">
      <!-- Bloque de texto izquierdo -->
      <div class="hero__content">
        <!-- Título principal -->
        <h1 class="hero__title">
          Kyro <span>Store</span>
        </h1>

        <!-- Enlaces de contacto / redes -->
        <div class="hero__links">
          <a href="#instagram" class="hero__link">
            <img src="Images/Instagram.png" alt="Instagram" />
            <span>INSTAGRAM</span>
          </a>
          <a href="#mail" class="hero__link">
            <img src="Images/Mail.png" alt="Mail" />
            <span>MAIL</span>
          </a>
        </div>

        <!-- Texto secundario -->
        <p class="hero__description">
          衣装を通し、自己表現の一部であれ。
        </p>

        <!-- Nota de autor al final -->
        <p class="hero__note">Página hecha por eldomiinus</p>
      </div>

      <!-- Bloque visual derecho con mockups -->
      <div class="hero__visual">
        <div class="hero__phone hero__phone--left">
          <img
            src="Images/iPhone 12 Pro 1.png"
            alt="Kyro Store mockup 1"
          />
        </div>
        <div class="hero__phone hero__phone--right">
          <img
            src="Images/iPhone 12 Pro 2.png"
            alt="Kyro Store mockup 2"
          />
        </div>
      </div>
    </main>
  </div>
</body>
</html>
